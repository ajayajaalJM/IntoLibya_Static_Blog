name: Publish schedule

# Rebuild production daily so posts/destinations with publishedAt <= now go live.
# Requires repo secret VERCEL_DEPLOY_HOOK_URL (Vercel → Project → Settings → Git → Deploy Hooks).

on:
  schedule:
    # Once daily at 06:00 UTC (≈ 08:00 Libya time)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret VERCEL_DEPLOY_HOOK_URL. Add a Deploy Hook URL in repo secrets."
            exit 1
          fi
          curl --fail --silent --show-error -X POST "$VERCEL_DEPLOY_HOOK_URL"
          echo
          echo "Deploy hook triggered."
